{% extends "base.html" %}

{% block content %}

<div class="auth-container">

    <div class="auth-card">

        <h1 class="page_name">註冊</h1>

        <form method="POST">

            <div class="input-group">
                <label>姓名</label>

                <input
                    type="text"
                    name="username"
                    placeholder="請輸入姓名"
                    required
                >
            </div>

            <div class="input-group">
                <label>Email</label>

                <input
                    type="email"
                    name="email"
                    placeholder="請輸入 Email"
                    required
                >
            </div>

            <div class="input-group">
                <label>密碼</label>

                <input
                    type="password"
                    name="password"
                    placeholder="請輸入密碼"
                    required
                >
            </div>

            <div class="input-group">
                <label>手機號碼</label>

                <input
                    type="tel"
                    name="phone"
                    placeholder="09xxxxxxxx"
                    maxlength="10"
                    pattern="09[0-9]{8}"
                    required
                >
            </div>

            {% if error %}
                <p class="error-message">
                    {{ error }}
                </p>
            {% endif %}

            <button
                class="auth-btn"
                type="submit"
            >
                註冊
            </button>

        </form>

        <p class="auth-footer">
            已經有帳號？
            <a href="{{ url_for('login') }}">
                前往登入
            </a>
        </p>

    </div>

</div>

{% endblock %}
