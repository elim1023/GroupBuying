{% extends "base.html" %}

{% block content %}

<h1 class="page_name">建立團購</h1>

<form method="POST">

    <p>團購名稱</p>

    <input
        type="text"
        name="title"
        required
    >

    <p>商品圖片網址</p>

    <input
        type="text"
        name="image_url"
    >

    <p>商品網站連結</p>

    <input
        type="text"
        name="product_url"
    >

    <p>商品介紹</p>

    <textarea
        name="description"
    ></textarea>

    <p>價格</p>

    <input
        type="number"
        name="price"
        placeholder="NT$"
    >
    
    <p>截止日期</p>
    <input type="date" name="deadline">

    <p>取貨方式</p>

    <select
        name="delivery_method"
    >

        <option>
            面交
        </option>

        <option>
            超商
        </option>

        <option>
            宅配
        </option>

    </select>

    <br><br>

    <button type="submit">

        建立團購

    </button>

</form>

{% endblock %}
