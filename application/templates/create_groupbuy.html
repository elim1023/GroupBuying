{% extends "base.html" %}

{% block content %}

<div class="create-container">

    <div class="create-card">

        <h1>建立團購</h1>

        <form method="POST">

            <div class="form-group">
                <label>團購名稱</label>
                <input type="text"
                       name="title"
                       placeholder="例如：iPhone 17 團購"
                       required>
            </div>

            <div class="form-group">
                <label>商品圖片網址</label>
                <input type="text"
                       name="image_url"
                       placeholder="https://...">
            </div>

            <div class="form-group">
                <label>商品網站連結</label>
                <input type="text"
                       name="product_url"
                       placeholder="https://...">
            </div>

            <div class="form-group">
                <label>商品介紹</label>
                <textarea
                    name="description"
                    rows="5"
                    placeholder="例如：
滿 10000 元 95 折
滿 20000 元 9 折
滿 30000 元 88 折">
                </textarea>
            </div>

            <div class="row">

                <div class="form-group half">
                    <label>價格</label>
                    <input type="number"
                           name="price"
                           placeholder="NT$ 1000">
                </div>

                <div class="form-group half">
                    <label>截止日期</label>
                    <input type="date"
                           name="deadline">
                </div>

            </div>

            <div class="form-group">
                <label>取貨方式</label>

                <select name="delivery_method">

                    <option>面交</option>
                    <option>超商</option>
                    <option>宅配</option>

                </select>
            </div>

            <button class="submit-btn" type="submit">
                建立團購
            </button>

        </form>

    </div>

</div>

{% endblock %}
